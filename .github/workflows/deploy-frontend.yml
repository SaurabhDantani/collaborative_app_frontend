name: Deploy Frontend to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            [ -s "$NVM_DIR/bash_completion" ] && \. "$NVM_DIR/bash_completion"
            export PATH="$NVM_DIR/versions/node/v24.15.0/bin:$PATH"
            echo "EC2_FRONTEND_DIR=${{ secrets.EC2_FRONTEND_DIR }}"
            if [ -z "${{ secrets.EC2_FRONTEND_DIR }}" ]; then
              echo "EC2_FRONTEND_DIR is not set"
              exit 1
            fi
            if [ ! -d "${{ secrets.EC2_FRONTEND_DIR }}" ]; then
              echo "Directory does not exist: ${{ secrets.EC2_FRONTEND_DIR }}"
              ls -la "$HOME"
              exit 1
            fi
            cd "${{ secrets.EC2_FRONTEND_DIR }}"
            pwd
            ls -la
            if [ ! -f package.json ]; then
              echo "package.json not found in $(pwd)"
              exit 1
            fi
            git pull origin main
            npm install
            npm run build
            pm2 startOrReload ecosystem.config.js --env production
